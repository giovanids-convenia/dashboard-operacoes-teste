<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Operações</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<script>
/* ============================================================
   ✏️  ATUALIZE APENAS ESTA SEÇÃO TODO DIA
   ============================================================ */
const DADOS = {
  titulo:        "Dashboard de Operações",
  periodo:       "Dia 23/03/2026",
  atualizado_em: "2026-03-23",

  grafico1: {
    titulo: "Entregas / Pedidos por Setor",
    labels: ["Setor A", "Setor B", "Setor C", "Setor D", "Setor E"],
    valores: [142, 98, 175, 63, 120]
  },

  grafico2: {
    titulo: "Estoque / Inventário por Setor (unidades)",
    labels: ["Setor A", "Setor B", "Setor C", "Setor D", "Setor E"],
    valores: [520, 310, 890, 215, 670]
  },

  grafico3: {
    titulo: "Vendas por Vendedor",
    labels: ["Ana", "Bruno", "Carlos", "Diana", "Eduardo"],
    valores: [38, 52, 29, 61, 44]
  },

  analise: "Setor C lidera em entregas (175) e estoque (890). Setor D apresenta o menor volume de pedidos — avaliar possível gargalo ou baixa demanda. No time comercial, Diana se destaca com 61 vendas no dia, seguida de Bruno (52). Carlos registra o menor desempenho e pode precisar de suporte."
};
/* ============================================================
   🔒 NÃO MEXA ABAIXO DESTA LINHA
   ============================================================ */
</script>

<style>
  :root {
    --indigo:     #13164E;
    --green:      #96CE00;
    --white:      #F0F4EF;
    --pink:       #FF86A3;
    --lavender:   #F0AEDB;
    --hydrangea:  #96DCD3;
    --ultramarine:#37019C;
    --amber:      #FFC53F;

    --bg:         var(--white);
    --surface:    #ffffff;
    --surface2:   #e8ede7;
    --border:     #d5dbd4;
    --text:       var(--indigo);
    --muted:      #6b7a8d;
    --radius:     14px;

    /* cores dos 3 gráficos */
    --c1: #96CE00;   /* green apple   */
    --c2: #37019C;   /* ultramarine   */
    --c3: #FF86A3;   /* pink          */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 36px 28px 52px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 22px;
    border-bottom: 2px solid var(--indigo);
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.04em;
    color: var(--indigo);
  }

  .header-title span {
    color: var(--green);
  }

  .header-periodo {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 5px;
  }

  .badge-live {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--indigo);
    color: var(--white);
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 0.75rem;
    font-weight: 500;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; }
    50%      { opacity:.2; }
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }

  /* ── CARD GRÁFICO ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 22px 18px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity .5s ease, transform .5s ease;
    box-shadow: 0 2px 12px rgba(19,22,78,.06);
  }

  .card.in { opacity: 1; transform: translateY(0); }

  /* topo colorido por gráfico */
  .card:nth-child(1) { border-top: 4px solid var(--c1); }
  .card:nth-child(2) { border-top: 4px solid var(--c2); }
  .card:nth-child(3) { border-top: 4px solid var(--c3); }

  .card-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .chart-wrap { height: 210px; position: relative; }

  /* ── CARD ANÁLISE ── */
  .card-analise {
    grid-column: 1 / -1;
    background: var(--indigo);
    border-radius: var(--radius);
    padding: 28px 36px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 28px;
    align-items: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity .5s ease .4s, transform .5s ease .4s;
    box-shadow: 0 4px 20px rgba(19,22,78,.15);
  }

  .card-analise.in { opacity: 1; transform: translateY(0); }

  .analise-icon {
    font-size: 1.8rem;
    padding: 14px;
    background: rgba(255,255,255,.08);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.15);
  }

  .analise-header {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--green);
    margin-bottom: 8px;
  }

  .analise-text {
    font-size: 0.93rem;
    line-height: 1.75;
    color: rgba(240,244,239,.9);
    font-weight: 300;
  }

  /* ── PILL LEGENDA ── */
  .pill {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    border-radius: 20px;
    padding: 2px 10px;
    margin-bottom: 10px;
    letter-spacing: .04em;
  }

  .card:nth-child(1) .pill { background: #96CE0020; color: #5a7c00; }
  .card:nth-child(2) .pill { background: #37019C20; color: var(--ultramarine); }
  .card:nth-child(3) .pill { background: #FF86A320; color: #c0385a; }
</style>

<header>
  <div>
    <div class="header-title" id="titulo"></div>
    <div class="header-periodo" id="periodo"></div>
  </div>
  <div class="badge-live">
    <span class="dot"></span>
    Atualizado em <strong id="atualizado" style="margin-left:4px"></strong>
  </div>
</header>

<div class="grid" id="grid"></div>

<script>
  const COLORS    = ['--c1','--c2','--c3'];
  const PILL_LABELS = ['Entregas', 'Estoque', 'Vendas'];

  function cssVar(v) {
    return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  }

  function drawChart(id, dados, colorVar) {
    const color = cssVar(colorVar);
    const ctx = document.getElementById(id).getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: dados.labels,
        datasets: [{
          data: dados.valores,
          backgroundColor: color + '30',
          borderColor: color,
          borderWidth: 2,
          borderRadius: 6,
          hoverBackgroundColor: color + '66',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#13164E',
            borderColor: '#37019C',
            borderWidth: 1,
            titleColor: '#F0F4EF',
            bodyColor: '#96DCD3',
            padding: 12,
            cornerRadius: 8,
          }
        },
        scales: {
          x: {
            grid: { color: '#e8ede7' },
            ticks: { color: '#6b7a8d', font: { family: 'DM Sans', size: 11 } }
          },
          y: {
            grid: { color: '#e8ede7' },
            ticks: { color: '#6b7a8d', font: { family: 'DM Sans', size: 11 } }
          }
        }
      }
    });
  }

  // Cabeçalho
  document.getElementById('titulo').textContent     = DADOS.titulo;
  document.getElementById('periodo').textContent    = DADOS.periodo;
  document.getElementById('atualizado').textContent = DADOS.atualizado_em;

  const graficos = [DADOS.grafico1, DADOS.grafico2, DADOS.grafico3];
  const delays   = [0.05, 0.15, 0.25];
  const grid     = document.getElementById('grid');

  grid.innerHTML =
    graficos.map((g, i) => `
      <div class="card" style="transition-delay:${delays[i]}s">
        <span class="pill">${PILL_LABELS[i]}</span>
        <div class="card-label">${g.titulo}</div>
        <div class="chart-wrap"><canvas id="g${i+1}"></canvas></div>
      </div>`
    ).join('') +
    `<div class="card-analise">
       <div class="analise-icon">📋</div>
       <div>
         <div class="analise-header">Análise do dia</div>
         <p class="analise-text">${DADOS.analise}</p>
       </div>
     </div>`;

  graficos.forEach((g, i) => drawChart(`g${i+1}`, g, COLORS[i]));

  setTimeout(() => {
    document.querySelectorAll('.card, .card-analise').forEach(el => el.classList.add('in'));
  }, 60);
</script>
</body>
</html>
